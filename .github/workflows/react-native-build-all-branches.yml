            export ENVFILE=.env.production
            export SENTRY_DISABLE_AUTO_UPLOAD=true
            echo "Publishing with ENVFILE: $ENVFILE"
            echo "./gradlew publishProdReleaseBundle --track internal --release-status draft --stacktrace --info"
