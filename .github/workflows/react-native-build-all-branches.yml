      - name: Publish AAB to Google Play
        run: |
          cd android
          if [[ "${{ env.ENVIRONMENT }}" =~ ^refs/heads/testing ]]; then
            export ENVFILE=.env.qa
            export SENTRY_DISABLE_AUTO_UPLOAD=true
            echo "Publishing with ENVFILE: $ENVFILE"
            echo "./gradlew publishQaReleaseBundle --track internal --release-status draft --stacktrace --info"
            ./gradlew publishQaReleaseBundle --track internal --release-status draft --stacktrace --info
          elif [[ "${{ env.ENVIRONMENT }}" =~ ^refs/heads/development ]]; then
            export ENVFILE=.env.development
            export SENTRY_DISABLE_AUTO_UPLOAD=true
            echo "Publishing with ENVFILE: $ENVFILE"
            echo "./gradlew publishDevReleaseBundle --track internal --release-status draft --stacktrace --info"
            ./gradlew publishDevReleaseBundle  --track internal --release-status draft --stacktrace --info
          elif [[ "${{ env.ENVIRONMENT }}" =~ ^refs/heads/release ]]; then
            export ENVFILE=.env.staging
            export SENTRY_DISABLE_AUTO_UPLOAD=true
            echo "Publishing with ENVFILE: $ENVFILE"
            echo "./gradlew publishStageReleaseBundle  --track internal --release-status draft --stacktrace --info"
