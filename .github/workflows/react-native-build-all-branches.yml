  # Define the ENVIRONMENT variable based on branch dynamically, if needed
  ENVIRONMENT: ${{ github.ref }}

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine latest version branch
        id: determine_version
        run: |
          echo "Determining the latest version branch..."
          if [[ "${{ env.ENVIRONMENT }}" =~ ^refs/heads/testing ]]; then
            LATEST_BRANCH=$(git branch -r | grep 'origin/testing' | sort -V | tail -n 1)
          elif [[ "${{ env.ENVIRONMENT }}" =~ ^refs/heads/development ]]; then
            LATEST_BRANCH=$(git branch -r | grep 'origin/development' | sort -V | tail -n 1)
          elif [[ "${{ env.ENVIRONMENT }}" =~ ^refs/heads/release ]]; then
            LATEST_BRANCH=$(git branch -r | grep 'origin/staging/' | sort -V | tail -n 1)
          elif [[ "${{ env.ENVIRONMENT }}" == "refs/heads/main" ]]; then
            LATEST_BRANCH="origin/main"
          fi
          echo "LATEST_BRANCH=${LATEST_BRANCH}" >> $GITHUB_ENV
          echo "Latest branch set to ${LATEST_BRANCH}"

      - name: Checkout the latest version branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.determine_version.outputs.latest_branch }}
          fetch-depth: 0

