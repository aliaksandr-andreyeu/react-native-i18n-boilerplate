      - name: Set up environment file
        run: |
          if [[ "${{ env.ENVIRONMENT }}" =~ ^refs/heads/testing ]]; then
            export ENVFILE='.env.qa'
            cat .env.qa
            echo $ENVFILE
          elif [[ "${{ env.ENVIRONMENT }}" =~ ^refs/heads/development ]]; then
            export ENVFILE=.env.development
            cat .env.development
            echo $ENVFILE
          elif [[ "${{ env.ENVIRONMENT }}" =~ ^refs/heads/release ]]; then
            export ENVFILE=.env.staging
            cat .env.staging
            echo $ENVFILE
          elif [[ "${{ env.ENVIRONMENT }}" == "refs/heads/main" ]]; then
            export ENVFILE=.env.production
            cat .env.production
            echo $ENVFILE
          fi

