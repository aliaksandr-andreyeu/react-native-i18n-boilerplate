#          ls -la app/build/outputs/apk/stage/release/
#          ls -la ./app/build/outputs/apk/stage/release/
#          ls -la .android/app/build/outputs/apk/stage/release/
#          ls -la ./android/app/build/outputs/apk/stage/release/
          
