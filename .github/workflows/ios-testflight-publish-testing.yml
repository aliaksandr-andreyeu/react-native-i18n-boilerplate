name: iOS Build and Upload to TestFlight
on:
  workflow_dispatch:

# concurrency:
#   group: ${{ github.ref }}
#   cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3

      - name: Install Bundler and Cocoapods
        run: |
          rm -rf vendor/bundle
          rm -f Gemfile.lock
          gem install bundler
          gem install cocoapods

      - name: Install Node.js dependencies
        run: |
          npm install

      # Update Cocoapods and resolve dependencies
      - name: Install Pods and update specs
        working-directory: ./ios
        run: |
          rm -f Podfile.lock
          bundle install
          bundle exec pod install --repo-update
      # Clean up before the build to avoid conflicts
      - name: Clean up derived data and caches
        run: |
          xcodebuild clean -workspace ios/amega.xcworkspace -scheme amega -configuration Debug
          rm -rf ~/Library/Developer/Xcode/DerivedData/*
      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Decode and set up iOS certificate
        shell: bash
        run: |
          # Decode the iOS distribution certificate and provisioning profile from secrets
          echo "${{ secrets.IOS_DISTRIBUTION_CREDENTIALS }}" | base64 --decode > ios_distribution.p12
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > provisioning.mobileprovision
      - name: Check OpenSSL version
        run: openssl version

      - name: Import certificate to keychain
        shell: bash
        run: |
          # Create a new keychain and import the decoded certificate
          security create-keychain -p "" build.keychain
          security import ios_distribution.p12 -k build.keychain -P "${{ secrets.P12_PASSWORD }}" -T /usr/bin/codesign

          # Make sure the keychain is unlocked and accessible
          security set-keychain-settings build.keychain
          security unlock-keychain -p "" build.keychain

          # Allow codesign to access the key in the keychain without prompting for permissions
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          # Add the new keychain to the list of keychains searched by codesign
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')

      - name: Set provisioning profile
        shell: bash
        run: |
          # Create the provisioning profile directory if it doesn't exist and copy the profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp provisioning.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Decode Base64 App Store Connect API key
        working-directory: ./ios
        shell: bash
        run: |
          echo "${{ secrets.APPSTORE_API_KEY_JSON_BASE64 }}" | base64 --decode | jq > ./AuthKey.json

      - name: Check AuthKey.json contents
        working-directory: ./ios
        shell: bash
        run: |
          cat AuthKey.json

      - name: Validate AuthKey.json
        working-directory: ./ios
        shell: bash
        run: |
          jq '.' AuthKey.json

      - name: Build and upload to TestFlight
        working-directory: ./ios
        run: |
          bundle exec fastlane beta
        env:
          APP_STORE_CONNECT_API_KEY_PATH: AuthKey.json
          FASTLANE_USER: ${{ secrets.FASTLANE_USER }}
          FASTLANE_PASSWORD: ${{ secrets.FASTLANE_PASSWORD }}
