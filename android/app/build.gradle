import groovy.json.JsonSlurper

// Top of your app/build.gradle
plugins {
    id "com.android.application"
    id "com.github.triplet.play" version "3.10.1" // Check for the latest version on GitHub - https://github.com/Triple-T/gradle-play-publisher
    // Other plugins
}

// Google Play Publisher configuration
play {
    serviceAccountCredentials = file("${project.rootDir}/app/google-play-service-account.json")
    track = "internal" // Adjust this as necessary
}

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

apply plugin: "com.google.gms.google-services"
apply plugin: "com.google.firebase.crashlytics"
apply plugin: "com.google.firebase.appdistribution"
apply plugin: "com.google.firebase.firebase-perf"

project.ext.envConfigFiles = [
    ""    : ".env.development",
    dev   : ".env.development",
    qa    : ".env.qa",
    stage : ".env.staging",
    prod  : ".env.production"
]

apply from: project(":react-native-config").projectDir.getPath() + "/dotenv.gradle"

/**
