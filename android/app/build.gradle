/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

def getVersionCodeFromEnv() {
    def versionCode = project.env.get("ANDROID_VERSION_CODE").toInteger()
    println("Version Code is ${versionCode}")
    return versionCode
}

def getVersionNameFromEnv() {
    def majorVersion = project.env.get("MAJOR_VERSION")
    def minorVersion = project.env.get("MINOR_VERSION")
    def patchVersion = project.env.get("PATCH_VERSION")
    def versionNumber = "${majorVersion}.${minorVersion}.${patchVersion}"
    println("Version Number is ${versionNumber}")
    return versionNumber
}

apply from: new File(["node", "--print", "require.resolve('@sentry/react-native/package.json')"].execute().text.trim(), "../sentry.gradle")

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.amega.capital.app"

    defaultConfig {
        applicationId "com.amega.capital.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        versionCode getVersionCodeFromEnv()
        versionName getVersionNameFromEnv()

        multiDexEnabled true

        resConfigs "en", "ar"

        resValue "string", "build_config_package", "com.amega.capital.app"

        externalNativeBuild {
            cmake {
                version "4.1.2"
                arguments "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
            }
        }
    }

    lint {
        disable "NullSafeMutableLiveData"
    }

    packagingOptions {
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libjsc.so'
        pickFirst 'lib/arm64-v8a/libjsc.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'

        exclude "lib/arm64-v8a/libimage_processing_util_jni.so"
        exclude "lib/arm64-v8a/libtensorflowlite_jni.so"
        exclude "lib/arm64-v8a/libtoolChecker.so"
        exclude "lib/x86_64/libimage_processing_util_jni.so"
        exclude "lib/x86_64/libtensorflowlite_jni.so"
        exclude "lib/x86_64/libtoolChecker.so"

        jniLibs {
            useLegacyPackaging false
        }
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            if (project.hasProperty("RELEASE_STORE_FILE")) {
                storeFile file(RELEASE_STORE_FILE)
                storePassword RELEASE_STORE_PASSWORD
                keyAlias RELEASE_KEY_ALIAS
                keyPassword RELEASE_KEY_PASSWORD
            }
        }
    }

    flavorDimensions = ["env"]

    productFlavors {
        dev {
            applicationId "com.amega.capital.development"
            minSdkVersion rootProject.ext.minSdkVersion
            targetSdkVersion rootProject.ext.targetSdkVersion
            resValue "string", "build_config_package", "com.amega.capital.app"
            signingConfig signingConfigs.release
        }
        qa {
            applicationId "com.amega.capital.qa"
            minSdkVersion rootProject.ext.minSdkVersion
            targetSdkVersion rootProject.ext.targetSdkVersion
            resValue "string", "build_config_package", "com.amega.capital.app"
            signingConfig signingConfigs.release
        }
        stage {
            applicationId "com.amega.capital.staging"
            minSdkVersion rootProject.ext.minSdkVersion
            targetSdkVersion rootProject.ext.targetSdkVersion
            resValue "string", "build_config_package", "com.amega.capital.app"
            signingConfig signingConfigs.release
        }
        prod {
            applicationId "com.amega.capital.trading"
            minSdkVersion rootProject.ext.minSdkVersion
            targetSdkVersion rootProject.ext.targetSdkVersion
            resValue "string", "build_config_package", "com.amega.capital.app"
            signingConfig signingConfigs.release
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.

            minifyEnabled enableProguardInReleaseBuilds

            shrinkResources true

            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"

            firebaseCrashlytics {
                nativeSymbolUploadEnabled true
                unstrippedNativeLibsDir "build/intermediates/merged_native_libs/release/out/lib"
            }

            firebaseAppDistribution {
                artifactType = "APK"
                groups = "amegacapitaltesters"
                serviceCredentialsFile = "appDistributionCredentials.json"
            }
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin

    implementation("com.facebook.react:react-android")

    implementation project(":react-native-config")

    implementation platform("com.google.firebase:firebase-bom:33.16.0")
    implementation("com.google.firebase:firebase-messaging")
    implementation("com.google.firebase:firebase-firestore")

    implementation("androidx.multidex:multidex:2.0.1")

    implementation("io.branch.sdk.android:library:5.8.0")

    implementation("com.sumsub.sns:idensic-mobile-sdk:1.35.1")

    implementation("com.android.installreferrer:installreferrer:2.2")

    implementation("com.google.android.gms:play-services-ads-identifier:18.0.0")
    implementation("com.google.android.gms:play-services-tagmanager:18.0.0")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
